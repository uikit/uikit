name: Publish release to npm

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish dev version even if commit message is not feat/fix/refactor/perf'
        type: boolean
        default: true
  push:
    branches:
      - 'develop'
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish-dev:
    if: |
      github.ref != 'refs/heads/main' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.ref == 'refs/heads/develop' &&
          (
            contains(github.event.head_commit.message, 'fix:') ||
            contains(github.event.head_commit.message, 'feat:') ||
            contains(github.event.head_commit.message, 'refactor:') ||
            contains(github.event.head_commit.message, 'perf:')
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install

      - run: pnpm eslint

      - run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            node ./build/publishDev.js --force
          else
            node ./build/publishDev.js
          fi

      - name: Publish to NPM
        if: ${{ success() }}
        run: npm publish --tag dev

  publish-main:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install

      - run: pnpm eslint

      - run: pnpm compile
      - run: pnpm compile-rtl

      - name: Publish to NPM
        if: ${{ success() }}
        run: npm publish
